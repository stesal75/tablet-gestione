<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestione Servizi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100dvh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #111827;
      color: #e2e8f0;
    }

    /* ── LAYOUT PRINCIPALE ─────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 1fr 74px;
      height: 100dvh;
      gap: 6px;
      padding: 6px;
    }

    .main-content {
      display: grid;
      grid-template-rows: 3fr 2fr;
      gap: 6px;
      min-height: 0;
    }

    .panel {
      background: #1e293b;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .panel-header {
      background: #0f172a;
      padding: 7px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #64a4e8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── ANAGRAFICA ────────────────────────────────────────── */
    .customer-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #0f172a;
      flex-shrink: 0;
      overflow-x: auto;
      align-items: center;
    }

    .cfield {
      padding: 8px 14px;
      border-right: 1px solid #0f172a;
      min-width: 0;
      flex-shrink: 0;
    }
    .cfield:last-child { border-right: none; }

    .cfield label {
      display: block;
      font-size: 9px;
      color: #4b6a9a;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 2px;
    }

    .cfield span {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .cfield-targa span { color: #60a5fa; }
    .cfield-empty { color: #2d4060; font-size: 13px; padding: 10px 14px; }

    /* ── MODALE CLIENTE ────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1e293b;
      border-radius: 16px;
      width: min(480px, 95vw);
      max-height: 85dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #1e3a5f;
    }

    .modal-header {
      background: #0f172a;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #64a4e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
    .modal-close:active { color: #e2e8f0; }

    .modal-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

    .modal-search {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      width: 100%;
    }
    .modal-search:focus { border-color: #3b82f6; }

    .customer-list { display: flex; flex-direction: column; gap: 4px; }

    .customer-item {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .customer-item:active { background: #1a2d4a; }
    .customer-item .ci-name { font-size: 14px; font-weight: 700; color: #e2e8f0; }
    .customer-item .ci-sub  { font-size: 12px; color: #64748b; margin-top: 2px; }

    .btn-new-customer {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      flex-shrink: 0;
    }
    .btn-new-customer:active { background: #1d4ed8; }

    .customer-form { display: flex; flex-direction: column; gap: 8px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-row.single { grid-template-columns: 1fr; }

    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field label { font-size: 10px; color: #4b6a9a; text-transform: uppercase; letter-spacing: 0.6px; }
    .form-field input {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }
    .form-field input:focus { border-color: #3b82f6; }
    .form-field input.err   { border-color: #ef4444; }

    .form-actions { display: flex; gap: 8px; margin-top: 4px; }

    .btn-save {
      flex: 1;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-save:active { background: #15803d; }

    .btn-cancel-form {
      background: #374151;
      color: #9ca3af;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-cancel-form:active { background: #4b5563; }

    /* ── BOTTONE CLIENTE SUL TASTIERINO ──────────────────── */
    .btn-select-customer {
      background: #1e3a5f;
      border: 1px dashed #3b82f6;
      border-radius: 10px;
      color: #93c5fd;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
      text-align: left;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
    }
    .btn-select-customer:active { background: #2a4f7a; }

    /* ── TOOLBAR INSERIMENTO ───────────────────────────────── */
    .services-toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid #0f172a;
      flex-shrink: 0;
    }

    .inp {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .inp:focus { border-color: #3b82f6; }
    .inp.err   { border-color: #ef4444; }

    .inp-desc   { flex: 3; }
    .inp-cat    { flex: 2; }
    .inp-amount {
      flex: 1.4;
      font-family: monospace;
      font-size: 16px;
      font-weight: 700;
      color: #60a5fa !important;
      text-align: right;
      cursor: default;
    }

    .btn-add {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      height: 38px;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .btn-add:active { background: #1d4ed8; }

    /* ── TABELLA SERVIZI ───────────────────────────────────── */
    .services-list {
      flex: 1;
      overflow-y: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      background: #0a111e;
      padding: 6px 10px;
      text-align: left;
      font-size: 10px;
      color: #4b6a9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody td {
      padding: 9px 10px;
      border-bottom: 1px solid #0f172a;
      vertical-align: middle;
    }

    tbody tr:active td { background: #1a2d4a; }

    .td-n    { color: #4b6a9a; font-size: 11px; width: 28px; }
    .td-amt  { text-align: right; font-family: monospace; font-weight: 700; color: #e2e8f0; }
    .td-del  { width: 34px; text-align: center; }

    .btn-del {
      background: none;
      border: none;
      color: #f87171;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .empty-msg {
      text-align: center;
      color: #2d4060;
      font-size: 13px;
      padding: 20px;
    }

    /* ── TASTIERINO ────────────────────────────────────────── */
    .keypad-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
      overflow: hidden;
    }

    .kp-display {
      background: #0a111e;
      border-radius: 10px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 24px;
      font-weight: 700;
      color: #60a5fa;
      text-align: right;
      flex-shrink: 0;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .kp-op-indicator {
      font-size: 15px;
      color: #f59e0b;
      min-width: 16px;
      text-align: center;
    }

    .kp-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      flex: 1;
    }

    .key {
      background: #0f172a;
      border: none;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.08s, transform 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .key:active { background: #1e3a5f; transform: scale(0.94); }

    .key-op    { background: #1e3a5f; color: #93c5fd; }
    .key-op:active { background: #2a4f7a; }
    .key-eq    { background: #1d4ed8; color: #fff; }
    .key-eq:active { background: #1e40af; }
    .key-clear { background: #7f1d1d; color: #fca5a5; font-size: 14px; }
    .key-clear:active { background: #991b1b; }
    .key-back  { background: #451a03; color: #fcd34d; font-size: 17px; }
    .key-back:active { background: #78350f; }
    .key-zero  { grid-column: span 2; }

    /* ── TOTALI ────────────────────────────────────────────── */
    .totals-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tot-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      background: #0f172a;
      border-radius: 10px;
    }

    .tot-label { font-size: 13px; color: #93c5fd; }
    .tot-value { font-family: monospace; font-size: 16px; font-weight: 700; }

    .tot-grand {
      background: #1e3a5f;
      border: 1px solid #3b82f6;
    }
    .tot-grand .tot-label { font-size: 13px; font-weight: 700; color: #e2e8f0; }
    .tot-grand .tot-value { font-size: 20px; color: #93c5fd; }

    .tot-empty { color: #2d4060; font-size: 13px; text-align: center; padding: 16px 0; }

    /* ── QUICK SIDEBAR ─────────────────────────────────────── */
    .quick-sidebar {
      background: #1e293b;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 6px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .qbtn {
      width: 100%;
      aspect-ratio: 1;
      min-height: 52px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      flex-shrink: 0;
      padding: 4px;
      line-height: 1.2;
      position: relative;
      transition: transform 0.08s;
    }
    .qbtn:active { transform: scale(0.91); }

    .qbtn-empty {
      background: #0f172a;
      border: 1.5px dashed #2d4060;
      color: #2d4060;
      font-size: 22px;
    }

    .qbtn-set {
      background: #0d2545;
      border: 1.5px solid #2563eb;
      color: #93c5fd;
    }

    .qbtn-add {
      background: #052e16;
      border: 1.5px dashed #16a34a;
      color: #4ade80;
      font-size: 22px;
      min-height: 44px;
      aspect-ratio: unset;
      flex-shrink: 0;
    }
    .qbtn-add:active { background: #064e1f; transform: scale(0.91); }

    @keyframes qbtn-hold {
      0%   { box-shadow: inset 0 0 0 0px rgba(239,68,68,0); }
      100% { box-shadow: inset 0 0 0 3px rgba(239,68,68,0.9); }
    }
    .qbtn-holding {
      animation: qbtn-hold 5s linear forwards;
    }

    /* ── CONTEXT SHEET ──────────────────────────────────────── */
    .context-sheet {
      background: #1e293b;
      border-radius: 16px;
      width: min(300px, 88vw);
      overflow: hidden;
      border: 1px solid #1e3a5f;
    }

    .context-sheet-header {
      background: #0f172a;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 700;
      color: #64a4e8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .cs-btn {
      display: block;
      width: 100%;
      background: none;
      border: none;
      border-top: 1px solid #0f172a;
      color: #e2e8f0;
      padding: 14px 16px;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
    }
    .cs-btn:active { background: #1a2d4a; }
    .cs-btn.danger { color: #f87171; }
    .cs-btn.muted  { color: #64748b; }

    /* ── TYPE TAB (semplice / distinta base) ───────────────── */
    .type-tab {
      flex: 1;
      background: #0f172a;
      border: 1.5px solid #1e3a5f;
      border-radius: 8px;
      color: #64748b;
      padding: 8px 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
    }
    .type-tab.active {
      background: #1e3a5f;
      border-color: #3b82f6;
      color: #93c5fd;
    }

    /* ── DISTINTA BASE ──────────────────────────────────────── */
    .comp-search-wrap { position: relative; }

    .comp-dropdown {
      position: absolute;
      top: calc(100% + 3px);
      left: 0; right: 0;
      background: #0d1a2e;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      z-index: 20;
      max-height: 160px;
      overflow-y: auto;
    }

    .comp-dd-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .comp-dd-item:last-child { border-bottom: none; }
    .comp-dd-item:active { background: #1e3a5f; }
    .comp-dd-item.already { opacity: 0.45; cursor: default; }

    .comp-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #0f172a;
      font-size: 12px;
    }
    .comp-item:last-child { border-bottom: none; }

    .comp-qty-btn {
      background: #1e3a5f;
      border: none;
      border-radius: 6px;
      color: #93c5fd;
      font-size: 16px;
      font-weight: 700;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .comp-qty-btn:active { background: #2a4f7a; }
    .comp-qty-val {
      min-width: 24px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .bundle-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0 0;
      margin-top: 4px;
      border-top: 1px solid #1e3a5f;
      font-weight: 700;
      font-size: 14px;
      color: #60a5fa;
    }

    /* ── PULSANTI HEADER ───────────────────────────────────── */
    .btn-hdr {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 7px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      cursor: pointer;
      touch-action: manipulation;
      letter-spacing: 0.3px;
    }
    .btn-hdr:active { background: #1e293b; }
    .btn-hdr-save {
      border-color: #16a34a;
      color: #4ade80;
      background: #052e16;
    }
    .btn-hdr-save:active { background: #064e1f; }
    .btn-hdr-new {
      border-color: #2563eb;
      color: #93c5fd;
      background: #0d2545;
    }
    .btn-hdr-new:active { background: #1e3a5f; }
    .btn-hdr-open {
      border-color: #d97706;
      color: #fbbf24;
      background: #1c1000;
    }
    .btn-hdr-open:active { background: #2d1f00; }

    /* ── TOAST ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: #fff;
      padding: 9px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── SCROLLBAR ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
  </style>
</head>
<body>

<div class="app">
<div class="main-content">

  <!-- ═══════════════════════════════════════════════════════
       PANNELLO SUPERIORE — Anagrafica + Servizi
  ════════════════════════════════════════════════════════ -->
  <div class="panel" id="panel-top">
    <div class="panel-header" style="justify-content:space-between">
      <span>👤 Cliente</span>
      <span style="display:flex;gap:6px">
        <button class="btn-hdr btn-hdr-open" onclick="openRapportiniModal()">📂 Apri</button>
        <button class="btn-hdr btn-hdr-save" onclick="saveRapportino()">💾 Salva</button>
        <button class="btn-hdr btn-hdr-new"  onclick="newRapportino()">＋ Nuovo</button>
      </span>
    </div>

    <!-- Anagrafica -->
    <div class="customer-bar" id="customer-bar">
      <span class="cfield-empty">Nessun cliente selezionato</span>
    </div>

    <!-- Toolbar inserimento riga -->
    <div class="services-toolbar">
      <input class="inp inp-desc" id="inp-desc" type="text" placeholder="Descrizione servizio…">
      <select class="inp inp-cat" id="inp-cat">
        <option value="">— Categoria —</option>
        <option>Manodopera</option>
        <option>Materiali</option>
        <option>Trasferta</option>
        <option>Consulenza</option>
        <option>Altro</option>
      </select>
      <input class="inp inp-amount" id="inp-amount" type="text" placeholder="0,00" readonly>
      <button class="btn-add" onclick="addRow()">＋</button>
    </div>

    <!-- Lista servizi -->
    <div class="services-list">
      <table>
        <thead>
          <tr>
            <th class="td-n">#</th>
            <th>Descrizione</th>
            <th>Categoria</th>
            <th style="text-align:center">Qtà</th>
            <th style="text-align:right">Importo €</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty-msg" class="empty-msg">Nessun servizio inserito</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       PANNELLO INFERIORE
  ════════════════════════════════════════════════════════ -->
  <div class="panel-bottom">

    <!-- ── TASTIERINO ── -->
    <div class="panel">
      <div class="panel-header">🔢 Tastierino</div>
      <div class="keypad-wrap">
        <button class="btn-select-customer" onclick="openCustomerModal()">
          <span>👤</span><span id="btn-cust-label">Seleziona cliente…</span>
        </button>
        <div class="kp-display">
          <span class="kp-op-indicator" id="kp-op"></span>
          <span id="kp-val">0</span>
        </div>
        <div class="kp-grid">
          <button class="key key-clear" onclick="kpClear()">CLR</button>
          <button class="key key-back"  onclick="kpBack()">⌫</button>
          <button class="key key-op"    onclick="kpOp('%')">%</button>
          <button class="key key-op"    onclick="kpOp('÷')">÷</button>

          <button class="key" onclick="kpDigit('7')">7</button>
          <button class="key" onclick="kpDigit('8')">8</button>

<script>
// ── CLIENTI ────────────────────────────────────────────────────────
let customers = JSON.parse(localStorage.getItem('tg_customers') || '[]');
let currentCustomer = null;
let editingCustomerId = null;

function saveCustomersToStorage() {
  localStorage.setItem('tg_customers', JSON.stringify(customers));
}

function openCustomerModal() {
  showList();
  document.getElementById('customer-modal').classList.add('open');
}

function closeCustomerModal() {
  document.getElementById('customer-modal').classList.remove('open');
}

function showList() {
  document.getElementById('view-list').style.display = '';
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('modal-title').textContent = '👤 Clienti';
  document.getElementById('cust-search').value = '';
  editingCustomerId = null;
  renderCustomerList();
}

function showForm(customer) {
  editingCustomerId = customer ? customer.id : null;
  document.getElementById('f-nome').value     = customer?.nome     || '';
  document.getElementById('f-cognome').value  = customer?.cognome  || '';
  document.getElementById('f-telefono').value = customer?.telefono || '';
  document.getElementById('f-email').value    = customer?.email    || '';
  document.getElementById('f-auto').value     = customer?.auto     || '';
  document.getElementById('f-targa').value    = customer?.targa    || '';
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-form').style.display = '';
  document.getElementById('modal-title').textContent = editingCustomerId ? '✏️ Modifica' : '＋ Nuovo cliente';
}

function saveCustomer() {
  const nome     = document.getElementById('f-nome').value.trim();
  const cognome  = document.getElementById('f-cognome').value.trim();
  const telefono = document.getElementById('f-telefono').value.trim();
  const targa    = document.getElementById('f-targa').value.trim();
  if (!nome && !cognome && !telefono && !targa) {
    ['f-telefono','f-targa'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.add('err');
      setTimeout(() => el.classList.remove('err'), 900);
    });
    return;
  }
  const data = {
    id:       editingCustomerId || Date.now(),
    nome,
    cognome,
    telefono: document.getElementById('f-telefono').value.trim(),
    email:    document.getElementById('f-email').value.trim(),
    auto:     document.getElementById('f-auto').value.trim(),
    targa:    document.getElementById('f-targa').value.trim().toUpperCase(),
  };
  if (editingCustomerId) {
    customers = customers.map(c => c.id === editingCustomerId ? data : c);
  } else {
    customers.push(data);
  }
  saveCustomersToStorage();
  selectCustomer(data);
}

function selectCustomer(c) {
  currentCustomer = c;
  renderCustomerBar();
  const label = [c.nome, c.cognome].filter(Boolean).join(' ');
  document.getElementById('btn-cust-label').textContent = label || 'Cliente selezionato';
  closeCustomerModal();
}

function deleteCustomer(id, e) {
  e.stopPropagation();
  customers = customers.filter(c => c.id !== id);
  saveCustomersToStorage();
  if (currentCustomer?.id === id) {
    currentCustomer = null;
    renderCustomerBar();
    document.getElementById('btn-cust-label').textContent = 'Seleziona cliente…';
  }
  renderCustomerList();
}

function renderCustomerList() {
  const q = (document.getElementById('cust-search').value || '').toLowerCase();
  const filtered = customers.filter(c =>
    [c.nome, c.cognome, c.telefono, c.auto, c.targa].join(' ').toLowerCase().includes(q)
  ).sort((a, b) => {
    const ka = (a.cognome + ' ' + a.nome).trim().toLowerCase();
    const kb = (b.cognome + ' ' + b.nome).trim().toLowerCase();
    return ka.localeCompare(kb, 'it');
  });
  const list = document.getElementById('customer-list');
  if (!filtered.length) {
    list.innerHTML = '<div style="color:#2d4060;font-size:13px;padding:10px 0">Nessun cliente trovato</div>';
    return;
  }
  list.innerHTML = filtered.map(c => {
    const name = [c.nome, c.cognome].filter(Boolean).join(' ') || '—';
    const sub  = [c.auto, c.targa ? `(${c.targa})` : ''].filter(Boolean).join(' ');
    return `<div class="customer-item" onclick="selectCustomer(${JSON.stringify(c).replace(/"/g,'&quot;')})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="ci-name">${esc(name)}</span>
        <span style="display:flex;gap:6px">
          <button style="background:none;border:none;color:#64748b;font-size:13px;cursor:pointer;padding:2px 4px" onclick="showForm(${JSON.stringify(c).replace(/"/g,'&quot;')});event.stopPropagation()">✏️</button>
          <button style="background:none;border:none;color:#f87171;font-size:13px;cursor:pointer;padding:2px 4px" onclick="deleteCustomer(${c.id},event)">✕</button>
        </span>
      </div>
      <div class="ci-sub">${esc([c.telefono, c.email].filter(Boolean).join(' · '))}${sub ? ' · '+esc(sub) : ''}</div>
    </div>`;
  }).join('');
}

function renderCustomerBar() {
  const bar = document.getElementById('customer-bar');
  if (!currentCustomer) {
    bar.innerHTML = '<span class="cfield-empty">Nessun cliente selezionato</span>';
    return;
  }
  const c = currentCustomer;
  const fields = [
    { label:'Nome',       val: [c.nome, c.cognome].filter(Boolean).join(' ') },
    { label:'Telefono',   val: c.telefono },
    { label:'Email',      val: c.email    },
    { label:'Automobile', val: c.auto     },
    { label:'Targa',      val: c.targa, cls:'cfield-targa' },
  ];
  bar.innerHTML = fields.filter(f => f.val).map(f =>
    `<div class="cfield ${f.cls||''}"><label>${f.label}</label><span>${esc(f.val)}</span></div>`
  ).join('');
}

// ── OCR TARGA ──────────────────────────────────────────────────────
function triggerCamera() {
  document.getElementById('ocr-status').textContent = '';
  document.getElementById('ocr-status').style.color = '#64748b';
  document.getElementById('ocr-input').value = '';
  document.getElementById('ocr-input').click();
}

function processOCR(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const status = document.getElementById('ocr-status');
  const btn = document.getElementById('btn-ocr');
  btn.disabled = true;
  runOCR(file, status, btn);
}

async function runOCR(file, status, btn) {
  try {
    status.style.color = '#64748b';
    status.textContent = '🔍 Elaborazione immagine…';

    const base64 = await preprocessPlate(file);
    status.textContent = '🔍 Invio a Google Vision…';

    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000));
    const fetchResult = fetch('https://vision.googleapis.com/v1/images:annotate?key=AIzaSyCtBZjpbJCi-FkLcMGxNSqGqsHp52N4_dk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION' }] }]
      }),
    }).then(async r => {
      const raw = await r.text();
      console.log('[OCR] HTTP:', r.status, raw);
      return { status: r.status, data: JSON.parse(raw), raw };
    });

    const { status: httpStatus, data, raw } = await Promise.race([fetchResult, timeout]);
    const combined = data?.responses?.[0]?.textAnnotations?.[0]?.description || '';
    console.log('[OCR] HTTP:', httpStatus, '— testo:', combined);

    if (httpStatus !== 200) {
      status.style.color = '#f87171';
      status.textContent = '✗ HTTP ' + httpStatus + ': ' + raw.slice(0, 150);
      btn.disabled = false;
      return;
    }

    const cleaned = combined.replace(/[^A-Z0-9]/gi, '').toUpperCase();
    const match = cleaned.match(/[A-Z]{2}[0-9]{3}[A-Z]{2}/);

    if (match) {
      document.getElementById('f-targa').value = match[0];
      status.style.color = '#6ee7b7';
      status.textContent = '✓ ' + match[0] + (combined ? '  (testo: ' + combined.replace(/\n/g,' ').slice(0,60) + ')' : '');
    } else {
      status.style.color = '#fbbf24';
      status.textContent = '⚠ Nessuna targa — testo API: "' + combined.replace(/\n/g,' ').slice(0, 80) + '"';
    }
  } catch(e) {
    console.error('[OCR] errore:', e);
    status.style.color = '#f87171';
    status.textContent = e.message === 'timeout' ? '✗ Timeout 15s' : '✗ Errore: ' + e.message.slice(0, 60);
  }
  btn.disabled = false;
}

function preprocessPlate(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      // Scala a max 1600px mantenendo colori originali (Google Vision li gestisce meglio)
      const scale = Math.min(1, 1600 / Math.max(img.width, img.height));
      const w = Math.round(img.width  * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', 0.92).split(',')[1]);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(''); };
    img.src = url;
  });
}

// chiudi modale cliccando fuori
document.getElementById('customer-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCustomerModal();
});

// ── CATEGORIE ──────────────────────────────────────────────────────
const CAT_STYLE = {
  'Manodopera': { bg:'#14290a', color:'#6ee7b7' },
  'Materiali':  { bg:'#2d1700', color:'#fbbf24' },
  'Trasferta':  { bg:'#0d1f4a', color:'#93c5fd' },
  'Consulenza': { bg:'#1e0a2e', color:'#c084fc' },
  'Altro':      { bg:'#1c1c00', color:'#d4d460' },
};

function catStyle(cat) {
  return CAT_STYLE[cat] || CAT_STYLE['Altro'];
}

// ── RIGHE SERVIZIO ──────────────────────────────────────────────────
let rows = [];
let uid  = 1;

function addRow() {
  const desc      = document.getElementById('inp-desc').value.trim();
  const cat       = document.getElementById('inp-cat').value || 'Altro';
  const amtRaw    = document.getElementById('inp-amount').value.replace(',', '.');
  const unitPrice = parseFloat(amtRaw) || 0;

  let ok = true;
  if (!desc) { flash('inp-desc'); ok = false; }
  if (unitPrice === 0) { flash('inp-amount'); ok = false; }
  if (!ok) return;

  const existing = rows.find(r => r.desc.toLowerCase() === desc.toLowerCase() && r.cat === cat);
  if (existing) {
    existing.qty = (existing.qty || 1) + 1;
    existing.amt = existing.qty * existing.unitPrice;
  } else {
    rows.push({ id: uid++, desc, cat, qty: 1, unitPrice, amt: unitPrice });
  }

  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-cat').value  = '';
  kpReset();

  render();
}

function deleteRow(id) {
  rows = rows.filter(r => r.id !== id);
  render();
}

function render() {
  renderRows();
  renderTotals();
}

function renderRows() {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty-msg');

  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map((r, i) => {
    const s   = catStyle(r.cat);
    const qty = r.qty || 1;
    return `<tr>
      <td class="td-n">${i+1}</td>
      <td>${esc(r.desc)}</td>
      <td><span class="badge" style="background:${s.bg};color:${s.color}">${esc(r.cat)}</span></td>
      <td style="text-align:center;width:36px;color:#93c5fd;font-weight:700;font-size:13px">${qty > 1 ? qty : ''}</td>
      <td class="td-amt">${money(r.amt)}</td>
      <td class="td-del"><button class="btn-del" onclick="deleteRow(${r.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function renderTotals() {
  const wrap = document.getElementById('totals-wrap');

  if (!rows.length) {
    wrap.innerHTML = '<div class="tot-empty">Nessun dato</div>';
    return;
  }

  const byCat = {};
  let grand = 0;
  for (const r of rows) {
    byCat[r.cat] = (byCat[r.cat] || 0) + r.amt;
    grand += r.amt;
  }

  const catHtml = Object.entries(byCat)
    .sort((a,b) => b[1] - a[1])
    .map(([cat, tot]) => {
      const s = catStyle(cat);
      return `<div class="tot-row">
        <span class="tot-label">
          <span class="badge" style="background:${s.bg};color:${s.color}">${esc(cat)}</span>
        </span>
        <span class="tot-value" style="color:${s.color}">${money(tot)}</span>
      </div>`;
    }).join('');

  wrap.innerHTML = `
    <div class="tot-row tot-grand">
      <span class="tot-label">TOTALE GLOBALE</span>
      <span class="tot-value">${money(grand)}</span>
    </div>
    ${catHtml}
  `;
}

// ── TASTIERINO ─────────────────────────────────────────────────────
const kp = { val:'0', op:null, stored:null, fresh:true, hasDot:false };

function kpReset() {
  kp.val='0'; kp.op=null; kp.stored=null; kp.fresh=true; kp.hasDot=false;
  syncDisplay();
}

function kpDigit(d) {
  if (kp.fresh) {
    kp.val = d==='0' ? '0' : d;
    kp.hasDot = false;
    kp.fresh = false;
  } else {
    if (kp.val==='0' && d!=='0') kp.val = d;
    else if (kp.val.replace(/[-.]/g,'').length < 10) kp.val += d;
  }
  syncDisplay();
}

function kpDot() {
  if (kp.hasDot) return;
  if (kp.fresh) { kp.val='0.'; kp.fresh=false; } else { kp.val+='.'; }
  kp.hasDot = true;
  syncDisplay();
}

function kpBack() {
  if (kp.fresh) return;
  if (kp.val.length <= 1 || (kp.val.length===2 && kp.val[0]==='-')) {
    kp.val='0'; kp.fresh=true; kp.hasDot=false;
  } else {
    if (kp.val.slice(-1)==='.') kp.hasDot=false;
    kp.val = kp.val.slice(0,-1);
  }
  syncDisplay();
}

function kpClear() { kpReset(); }

function kpOp(op) {
  if (kp.op && !kp.fresh) kpEqual();
  kp.stored = parseFloat(kp.val) || 0;
  kp.op = op;
  kp.fresh = true;
  syncDisplay();
}

function kpEqual() {
  if (!kp.op || kp.stored===null) return;
  const a=kp.stored, b=parseFloat(kp.val)||0;
  let r;
  switch(kp.op) {
    case '+': r=a+b; break;
    case '−': r=a-b; break;
    case '×': r=a*b; break;
    case '÷': r=b?a/b:0; break;
    case '%': r=a*b/100; break;
    default:  r=b;
  }
  kp.val = parseFloat(r.toFixed(6)).toString();
  kp.op=null; kp.stored=null;
  kp.hasDot = kp.val.includes('.');
  kp.fresh = false;
  syncDisplay();
}

function syncDisplay() {
  document.getElementById('kp-val').textContent = kp.val.replace('.', ',');
  document.getElementById('kp-op').textContent  = kp.op || '';

  const v = parseFloat(kp.val) || 0;
  document.getElementById('inp-amount').value = v > 0 ? kp.val.replace('.',',') : '';
}

// -- Rendering sidebar --
function renderSidebar() {
  const sidebar = document.getElementById('quick-sidebar');
  let html = '';

  const displayOrder = quickButtons.map((_, i) => i).sort((a, b) => {
    const pa = quickButtons[a].productId !== null ? products.find(p => p.id === quickButtons[a].productId) : null;
    const pb = quickButtons[b].productId !== null ? products.find(p => p.id === quickButtons[b].productId) : null;
    if (pa && pb) return pa.desc.localeCompare(pb.desc, 'it');
    if (pa) return -1;
    if (pb) return 1;
    return 0;
  });

  displayOrder.forEach(i => {
    const qb = quickButtons[i];
    let btnHtml;
    if (qb.productId !== null) {
      const prod = products.find(p => p.id === qb.productId);
      if (prod) {
        const s = catStyle(prod.cat || 'Altro');
        const icon = qb.icon || '';
        const label = prod.desc.length > 10 ? prod.desc.slice(0, 9) + '…' : prod.desc;
        const priceStr = typeof prod.price === 'number' ? prod.price.toFixed(2).replace('.', ',') + '€' : '';
        btnHtml = `<button class="qbtn qbtn-set" data-idx="${i}"
          style="background:${s.bg};border-color:${s.color};color:${s.color}"
          oncontextmenu="return false">
          ${icon ? `<span style="font-size:20px;line-height:1">${icon}</span>` : ''}
          <span style="font-size:9px;text-align:center;width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block">${esc(label)}</span>
          <span style="font-size:8px;font-family:monospace">${esc(priceStr)}</span>
        </button>`;
      } else {
        btnHtml = `<button class="qbtn qbtn-empty" data-idx="${i}" oncontextmenu="return false" title="Prodotto rimosso">?</button>`;
      }
    } else {
      btnHtml = `<button class="qbtn qbtn-empty" data-idx="${i}" oncontextmenu="return false">?</button>`;
    }
    html += btnHtml;
  });

  html += `<button class="qbtn qbtn-add" onclick="addQuickButton()">＋</button>`;
  sidebar.innerHTML = html;

  sidebar.querySelectorAll('.qbtn[data-idx]').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.addEventListener('pointerdown', e => { e.preventDefault(); qbtnStartHold(idx, el); });
    el.addEventListener('pointerup',   () => qbtnEndHold(idx));
    el.addEventListener('pointercancel', qbtnCancelHold);
    el.addEventListener('pointerleave',  qbtnCancelHold);
    el.addEventListener('contextmenu', e => e.preventDefault());
  });
}

// -- Long press logic --
let _qbtnTimer = null;
let _qbtnHoldEl = null;
let _qbtnFired = false;

function qbtnStartHold(idx, el) {
  qbtnCancelHold();
  _qbtnFired = false;
  _qbtnHoldEl = el;
  el.classList.add('qbtn-holding');
  _qbtnTimer = setTimeout(() => {
    _qbtnFired = true;
    el.classList.remove('qbtn-holding');
    _qbtnTimer = null;
    openQbtnContext(idx);
  }, 5000);
}

function qbtnEndHold(idx) {
  if (_qbtnTimer !== null) {
    clearTimeout(_qbtnTimer);
    _qbtnTimer = null;
    if (_qbtnHoldEl) _qbtnHoldEl.classList.remove('qbtn-holding');
    _qbtnHoldEl = null;
    if (!_qbtnFired) qbtnClick(idx);
  }
}

function qbtnCancelHold() {
  if (_qbtnTimer !== null) { clearTimeout(_qbtnTimer); _qbtnTimer = null; }
  if (_qbtnHoldEl) { _qbtnHoldEl.classList.remove('qbtn-holding'); _qbtnHoldEl = null; }
}

function qbtnClick(idx) {
  const qb = quickButtons[idx];
  if (qb.productId === null) {
    openQbtnAssign(idx);
    return;
  }
  const prod = products.find(p => p.id === qb.productId);
  if (!prod) { openQbtnAssign(idx); return; }
  addQuickRow(prod, idx);
}

function addQuickRow(prod, idx) {
  const existing = prod.id ? rows.find(r => r.productId === prod.id) : null;
  if (existing) {
    existing.qty = (existing.qty || 1) + 1;
    existing.amt = existing.qty * existing.unitPrice;
  } else {
    const unitPrice = prod.price || 0;
    rows.push({ id: uid++, desc: prod.desc, cat: prod.cat || 'Altro', qty: 1, unitPrice, amt: unitPrice, productId: prod.id || null });
  }
  render();
  // feedback flash
  const el = document.querySelector(`.qbtn[data-idx="${idx}"]`);
  if (el) {
    el.style.transition = 'none';
    el.style.filter = 'brightness(2.2)';
    setTimeout(() => { el.style.filter = ''; el.style.transition = ''; }, 180);
  }
}

function addQuickButton() {
  quickButtons.push({ productId: null });
  saveQuickButtons();
  renderSidebar();
}

    return `<div class="customer-item" onclick="assignProduct(${p.id})">

          <button style="background:none;border:none;color:#64748b;font-size:14px;cursor:pointer;padding:2px 4px" onclick="showProdForm(${pJson});event.stopPropagation()">✏️</button>

        </span>
      </div>
      <div class="ci-sub">
        ${p.code ? `<span style="font-family:monospace;font-size:11px;color:#4b6a9a;margin-right:6px">${esc(p.code)}</span>` : ''}
        <span class="badge" style="background:${s.bg};color:${s.color}">${esc(p.cat || 'Altro')}</span>
        ${p.type === 'bundle' ? `<span class="badge" style="background:#1e0a2e;color:#c084fc;margin-left:4px">DB</span>` : ''}
      </div>
    </div>`;

function assignProduct(productId) {
  if (_qbtnAssignIdx !== null) {
    quickButtons[_qbtnAssignIdx].productId = productId;
    saveQuickButtons();
    renderSidebar();
    const idx = _qbtnAssignIdx;
    closeQbtnAssign();
    openIconPicker(idx);
  } else {
    closeQbtnAssign();
  }
}

function saveProd() {
  const code = document.getElementById('pf-code').value.trim().toUpperCase();
  const desc = document.getElementById('pf-desc').value.trim();
  const cat  = document.getElementById('pf-cat').value || 'Altro';
  if (!desc) { flash('pf-desc'); return; }

  let price, type, components;
  if (_currentProdType === 'bundle') {
    if (!_bundleComponents.length) {
      const el = document.getElementById('pf-comp-search');
      el.style.borderColor = '#ef4444';
      setTimeout(() => el.style.borderColor = '', 900);
      return;
    }
    price      = getBundleTotal();
    type       = 'bundle';
    components = JSON.parse(JSON.stringify(_bundleComponents));
  } else {
    price      = parseFloat(document.getElementById('pf-price').value) || 0;
    type       = 'simple';
    components = [];
  }

  if (_editingProdId) {
    products = products.map(p => p.id === _editingProdId ? { id: p.id, code, desc, cat, price, type, components } : p);
    saveProducts();
    renderSidebar();
    showProdList();
  } else {
    const newProd = { id: Date.now(), code, desc, cat, price, type, components };
    products.push(newProd);
    saveProducts();
    if (_qbtnAssignIdx !== null) {
      quickButtons[_qbtnAssignIdx].productId = newProd.id;
      saveQuickButtons();
      renderSidebar();
      const idx = _qbtnAssignIdx;
      closeQbtnAssign();
      openIconPicker(idx);
    } else {
      renderSidebar();
      showProdList();
    }
  }
}

function deleteProd(id, e) {
  e.stopPropagation();
  products = products.filter(p => p.id !== id);
  quickButtons.forEach(qb => { if (qb.productId === id) qb.productId = null; });
  saveProducts();
  saveQuickButtons();
  renderSidebar();
  renderProdList();
}

let rapportiniCounter = parseInt(localStorage.getItem('tg_rapp_counter') || '0');

function saveRapportino() {
  if (!rows.length && !currentCustomer) {
    showToast('Nessun dato da salvare', '#ef4444');
    return;
  }
  rapportiniCounter++;
  const rapp = {
    id: Date.now(),
    numero: rapportiniCounter,
    data: new Date().toISOString(),
    customer: currentCustomer ? { ...currentCustomer } : null,
    rows: JSON.parse(JSON.stringify(rows)),
  };
  const saved = JSON.parse(localStorage.getItem('tg_rapportini') || '[]');
  saved.push(rapp);
  localStorage.setItem('tg_rapportini', JSON.stringify(saved));
  localStorage.setItem('tg_rapp_counter', rapportiniCounter);
  showToast(`✓ Rapportino #${rapportiniCounter} salvato`);
}

function newRapportino() {
  if (rows.length && !confirm('Aprire un nuovo rapportino? Le modifiche non salvate andranno perse.')) return;
  rows = [];
  uid  = 1;
  currentCustomer = null;
  renderCustomerBar();
  document.getElementById('btn-cust-label').textContent = 'Seleziona cliente…';
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-cat').value  = '';

  render();
}

function openRapportiniModal() {
  renderRapportiniList();
  document.getElementById('rapportini-modal').classList.add('open');
}

function closeRapportiniModal() {
  document.getElementById('rapportini-modal').classList.remove('open');
}

function renderRapportiniList() {
  const saved = JSON.parse(localStorage.getItem('tg_rapportini') || '[]');
  const list  = document.getElementById('rapportini-list');

  if (!saved.length) {
    list.innerHTML = '<div style="color:#2d4060;font-size:13px;padding:10px 0">Nessun rapportino salvato</div>';
    return;
  }

  // più recente prima
  const sorted = [...saved].sort((a, b) => b.id - a.id);

  list.innerHTML = sorted.map(r => {
    const custName = r.customer
      ? [r.customer.nome, r.customer.cognome].filter(Boolean).join(' ') || '—'
      : 'Nessun cliente';
    const total = (r.rows || []).reduce((s, row) => s + (row.amt || 0), 0);
    const data  = new Date(r.data).toLocaleString('it-IT', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
    return `<div class="customer-item" onclick="loadRapportino(${r.id})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="ci-name">#${r.numero} — ${esc(custName)}</span>
        <span style="display:flex;gap:6px;align-items:center">
          <span style="font-family:monospace;font-size:13px;color:#60a5fa">${money(total)}</span>
          <button style="background:none;border:none;color:#f87171;font-size:14px;cursor:pointer;padding:2px 6px"
            onclick="deleteRapportino(${r.id},event)">✕</button>
        </span>
      </div>
      <div class="ci-sub">${esc(data)} · ${(r.rows||[]).length} rig${(r.rows||[]).length===1?'a':'he'}</div>
    </div>`;
  }).join('');
}

function loadRapportino(id) {
  if (rows.length && !confirm('Caricare questo rapportino? Le modifiche correnti non salvate andranno perse.')) return;
  const saved = JSON.parse(localStorage.getItem('tg_rapportini') || '[]');
  const rapp  = saved.find(r => r.id === id);
  if (!rapp) return;

  rows           = JSON.parse(JSON.stringify(rapp.rows || []));
  currentCustomer = rapp.customer ? { ...rapp.customer } : null;
  uid            = rows.length ? Math.max(...rows.map(r => r.id)) + 1 : 1;

  renderCustomerBar();
  document.getElementById('btn-cust-label').textContent = currentCustomer
    ? ([currentCustomer.nome, currentCustomer.cognome].filter(Boolean).join(' ') || 'Cliente selezionato')
    : 'Seleziona cliente…';
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-cat').value  = '';
  kpReset();
  render();
  closeRapportiniModal();
  showToast(`✓ Rapportino #${rapp.numero} caricato`);
}

function deleteRapportino(id, e) {
  e.stopPropagation();
  const saved = JSON.parse(localStorage.getItem('tg_rapportini') || '[]');
  const rapp  = saved.find(r => r.id === id);
  if (!rapp || !confirm(`Eliminare il rapportino #${rapp.numero}?`)) return;
  localStorage.setItem('tg_rapportini', JSON.stringify(saved.filter(r => r.id !== id)));
  renderRapportiniList();
}

function setProdType(type) {
  _currentProdType = type;
  document.getElementById('pf-tab-simple').classList.toggle('active', type === 'simple');
  document.getElementById('pf-tab-bundle').classList.toggle('active', type === 'bundle');
  document.getElementById('pf-price-row').style.display    = type === 'simple' ? '' : 'none';
  document.getElementById('pf-bundle-section').style.display = type === 'bundle' ? '' : 'none';
  if (type === 'bundle') renderBundleComps();
}

function searchBundleComp() {
  const q = document.getElementById('pf-comp-search').value.trim().toLowerCase();
  const dropdown = document.getElementById('pf-comp-dropdown');
  if (!q) { dropdown.style.display = 'none'; return; }

  const alreadyIn = new Set(_bundleComponents.map(c => c.productId));
  const results = products
    .filter(p => p.id !== _editingProdId &&
      (p.desc + ' ' + (p.code || '')).toLowerCase().includes(q))
    .slice(0, 8);

  if (!results.length) { dropdown.style.display = 'none'; return; }

  dropdown.innerHTML = results.map(p => {
    const already = alreadyIn.has(p.id);
    const typeTag = p.type === 'bundle' ? `<span style="font-size:10px;color:#c084fc;margin-right:4px">DB</span>` : '';
    return `<div class="comp-dd-item${already ? ' already' : ''}" ${already ? '' : `onclick="addBundleComp(${p.id})"`}>
      <span>${typeTag}${p.code ? `<span style="color:#4b6a9a;font-size:10px;font-family:monospace">${esc(p.code)} </span>` : ''}${esc(p.desc)}${already ? ' <span style="color:#64748b;font-size:10px">(già inserito)</span>' : ''}</span>
      <span style="font-family:monospace;font-size:12px;color:#60a5fa;flex-shrink:0">${money(p.price || 0)}</span>
    </div>`;
  }).join('');
  dropdown.style.display = '';
}

function addBundleComp(productId) {
  if (!_bundleComponents.find(c => c.productId === productId)) {
    _bundleComponents.push({ productId, qty: 1 });
  }
  document.getElementById('pf-comp-search').value = '';
  document.getElementById('pf-comp-dropdown').style.display = 'none';
  renderBundleComps();
}

function removeBundleComp(productId) {
  _bundleComponents = _bundleComponents.filter(c => c.productId !== productId);
  renderBundleComps();
}

function updateBundleCompQty(productId, val) {
  const comp = _bundleComponents.find(c => c.productId === productId);
  if (comp) comp.qty = Math.max(1, parseInt(val) || 1);
  renderBundleComps();
}

function getBundleTotal() {
  return _bundleComponents.reduce((sum, c) => {
    const prod = products.find(p => p.id === c.productId);
    return sum + (prod ? (prod.price || 0) * c.qty : 0);
  }, 0);
}

function renderBundleComps() {
  const list = document.getElementById('pf-comp-list');
  if (!_bundleComponents.length) {
    list.innerHTML = '<div style="color:#2d4060;font-size:12px;padding:4px 0">Nessun componente — cerca e aggiungi articoli sopra</div>';
  } else {
    list.innerHTML = _bundleComponents.map(c => {
      const prod = products.find(p => p.id === c.productId);
      if (!prod) return '';
      const subtotal = (prod.price || 0) * c.qty;
      return `<div class="comp-item">
        <span style="flex:1">${prod.code ? `<span style="color:#4b6a9a;font-size:10px;font-family:monospace">${esc(prod.code)} </span>` : ''}${esc(prod.desc)}</span>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
          <button class="comp-qty-btn" onclick="updateBundleCompQty(${c.productId},${c.qty - 1})">−</button>
          <span class="comp-qty-val">${c.qty}</span>
          <button class="comp-qty-btn" onclick="updateBundleCompQty(${c.productId},${c.qty + 1})">+</button>
        </div>
        <span style="font-family:monospace;font-size:11px;color:#64748b;min-width:58px;text-align:right">${money(subtotal)}</span>
        <button onclick="removeBundleComp(${c.productId})" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0">✕</button>
      </div>`;
    }).join('');
  }
  document.getElementById('pf-bundle-total').textContent = money(getBundleTotal());
}

// chiudi dropdown componenti cliccando fuori
document.getElementById('pf-comp-search').addEventListener('blur', () => {
  setTimeout(() => { document.getElementById('pf-comp-dropdown').style.display = 'none'; }, 180);
});

// init
render();
renderSidebar();
</script>
</body>
</html>
